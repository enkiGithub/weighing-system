# ============================================================
# 称重系统管理平台 — Nginx 反向代理配置
# 使用方式:
#   sudo cp handover/templates/nginx.example.conf /etc/nginx/sites-available/weighing-system
#   sudo ln -sf /etc/nginx/sites-available/weighing-system /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name _;  # 修改为实际域名或IP

    # 日志
    access_log /var/log/nginx/weighing-access.log;
    error_log  /var/log/nginx/weighing-error.log;

    # 请求体大小限制（DXF文件上传需要）
    client_max_body_size 50m;

    # 反向代理到 Node.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 支持（未来采集服务需要）
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 静态资源缓存（Vite 构建产物含 hash，可长期缓存）
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}

